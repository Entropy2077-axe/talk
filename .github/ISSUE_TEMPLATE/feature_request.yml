name: 功能建议
description: 提议新的体验或改进
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你期望的方案
      description: 描述用户如何使用它，而不只是列出实现技术。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 其他考虑过的方案
  - type: dropdown
    id: area
    attributes:
      label: 功能区域
      options: [聊天与人设, 记忆与关系, 朋友圈, 群聊, 小游戏系统, Android, 开发者体验, 其他]
    validations:
      required: true
